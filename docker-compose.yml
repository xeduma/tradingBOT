version: "3.9"

# ─── APEX TRADING — Stack complète ────────────────────────────────────────────
# Démarrage : docker compose up -d
# Arrêt propre : docker compose down
# Logs moteur : docker compose logs -f trading-engine

services:

  # ── Base de données TimescaleDB ─────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: apex-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB:       trading
      POSTGRES_USER:     apex
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apex_secure_pwd}
    volumes:
      - timescale_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apex -d trading"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Moteur de trading Python ────────────────────────────────────────────────
  trading-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apex-engine
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    env_file: .env
    environment:
      DB_URL:            postgresql://apex:${DB_PASSWORD:-apex_secure_pwd}@timescaledb:5432/trading
      PROMETHEUS_PORT:   "8000"
      LOG_LEVEL:         INFO
    ports:
      - "8000:8000"   # Métriques Prometheus
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ── Prometheus ──────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: apex-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: apex-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin123}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/trading.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"

volumes:
  timescale_data:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: tradingbot-claude_default
    external: true
